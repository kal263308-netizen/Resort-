<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Bay Resort</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Poppins',sans-serif;background:#f9f9f9;color:#333;}

/* NAVBAR */
header{
position:fixed;
width:100%;
padding:20px 60px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(8px);
z-index:1000;
}
nav{display:flex;justify-content:space-between;align-items:center;}
nav h2{color:white;font-family:'Playfair Display',serif;}
nav ul{list-style:none;display:flex;gap:30px;align-items:center;}
nav a{color:white;text-decoration:none;transition:0.3s;}
nav a:hover{color:#caa247;}

/* HERO VIDEO */
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
}
.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}
.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
top:0;
left:0;
z-index:-1;
}
.hero h1{
font-family:'Playfair Display',serif;
font-size:52px;
margin-bottom:20px;
}
.hero p{
font-size:18px;
margin-bottom:30px;
}
.btn{
padding:14px 40px;
background:#caa247;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:bold;
color:white;
}

/* SECTION */
.section{padding:100px 10%;text-align:center;}

/* ROOMS */
.rooms{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;margin-top:40px;}
.card{
width:300px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}
.card:hover{transform:translateY(-6px);}
.card img{width:100%;height:200px;object-fit:cover;}
.card-content{padding:20px;}
.price{color:#caa247;font-weight:bold;margin-top:10px;}

/* RESERVATION */
.reservation{
background:#fff;
padding:80px 10%;
text-align:center;
}
.reservation input{
padding:12px;
margin:10px;
width:220px;
border-radius:8px;
border:1px solid #ccc;
}
.reservation button{
padding:12px 35px;
background:#caa247;
border:none;
border-radius:30px;
cursor:pointer;
color:white;
font-weight:bold;
}

/* FOOTER */
footer{
background:#111;
color:white;
padding:20px;
text-align:center;
}
</style>
</head>

<body>

<header>
<nav>
<h2>Azure Bay Resort</h2>
<ul>
<li><a href="#rooms">Rooms</a></li>
<li><a href="#reservation">Reservation</a></li>
<li><a href="https://wa.me/919876543210?text=Hi%20I%20want%20to%20book%20a%20room" target="_blank">WhatsApp</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-luxury-resort-pool-720p.mp4" type="video/mp4">
</video>

<div>
<h1>Experience Timeless Luxury</h1>
<p>Where Comfort Meets Elegance</p>
<button class="btn">Book Your Stay</button>
</div>
</section>

<!-- ROOMS -->
<section id="rooms" class="section">
<h2 style="font-family:'Playfair Display',serif;">Our Premium Rooms</h2>

<div class="rooms">
<div class="card">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<div class="card-content">
<h3>Deluxe Room</h3>
<p class="price">₹7,999 / Night</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1578683010236-d716f9a3f461">
<div class="card-content">
<h3>Luxury Suite</h3>
<p class="price">₹14,999 / Night</p>
</div>
</div>
</div>
</section>

<!-- RESERVATION -->
<section id="reservation" class="reservation">
<h2 style="font-family:'Playfair Display',serif;">Reserve Your Stay</h2>

<input type="date">
<input type="date">
<input type="number" placeholder="Guests">
<br>
<button>Check Availability</button>

<br><br>

<a href="https://rzp.io/l/YOURADVANCELINK" target="_blank">
<button>Pay ₹3,000 Advance Booking</button>
</a>

</section>

<footer>
© 2026 Azure Bay Resort | All Rights Reserved
</footer>

</body>
</html>
